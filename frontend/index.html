<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GasolinazoPR - Precios de Gasolina en Puerto Rico</title><link rel="stylesheet" href="/static/css/style.css"></head><body><header><div class="header-content"><h1>&#9981; GasolinazoPR</h1><p class="subtitle">Precios de gasolina reportados por el pueblo</p></div></header><main><section class="filters"><select id="filtro-municipio"><option value="">Todos los municipios</option></select><select id="filtro-combustible"><option value="">Todos los combustibles</option><option value="Regular">Regular</option><option value="Premium">Premium</option><option value="Diesel">Diesel</option></select><button onclick="cargarPrecios()">Buscar</button></section><section class="prices-section"><h2>Precios Actuales <span id="total-count"></span></h2><div id="prices-list"></div></section><section class="report-section"><h2>Reportar un Precio</h2><div class="form-group"><input type="text" id="station-name" placeholder="Nombre de la gasolinera" required></div><div class="form-group"><select id="municipality"><option value="">Selecciona municipio</option></select></div><div class="form-group"><select id="fuel-type"><option value="">Tipo de combustible</option><option value="Regular">Regular</option><option value="Premium">Premium</option><option value="Diesel">Diesel</option></select></div><div class="form-group"><input type="number" id="price" placeholder="Precio (ej: 3.45)" step="0.01" min="0" required></div><button class="btn-report" onclick="reportarPrecio()">Reportar Precio</button><p id="form-message"></p></section></main><footer><p>GasolinazoPR 2024 - Hecho en Puerto Rico</p></footer><script src="/static/js/app.js"></script></body></html>
