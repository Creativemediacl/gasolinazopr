<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GasolinazoPR</title><link rel="stylesheet" href="/static/css/style.css"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7246947414906151" crossorigin="anonymous"></script></head><body><header><div class="header-content"><h1>GasolinazoPR</h1><p class="subtitle">Precios de gasolina reportados por el pueblo</p></div></header><main><section class="filters"><select id="filtro-municipio"><option value="">Todos los municipios</option></select><select id="filtro-combustible"><option value="">Todos los combustibles</option><option value="Regular">Regular</option><option value="Premium">Premium</option><option value="Diesel">Diesel</option></select><button onclick="cargarPrecios()">Buscar</button></section><section class="prices-section"><h2>Precios Actuales <span id="total-count"></span></h2><div id="prices-list"></div></section><section class="report-section"><h2>Reportar un Precio</h2><div class="form-group"><input type="text" id="station-name" placeholder="Nombre de la gasolinera" required></div><div class="form-group"><select id="municipality"><option value="">Selecciona municipio</option></select></div><div class="form-group"><select id="fuel-type"><option value="">Tipo de combustible</option><option value="Regular">Regular</option><option value="Premium">Premium</option><option value="Diesel">Diesel</option></select></div><div class="form-group"><input type="number" id="price" placeholder="Precio (ej: 3.45)" step="0.01" min="0" required></div><button class="btn-report" onclick="reportarPrecio()">Reportar Precio</button><p id="form-message"></p></section></main><footer><p>GasolinazoPR 2024 - Hecho en Puerto Rico</p></footer><script>const API="/api";async function cargarMunicipios(){const res=await fetch(API+"/municipios");const data=await res.json();["filtro-municipio","municipality"].forEach(id=>{const sel=document.getElementById(id);data.municipios.forEach(m=>{const opt=document.createElement("option");opt.value=m;opt.textContent=m;sel.appendChild(opt);});});}async function cargarPrecios(){const mun=document.getElementById("filtro-municipio").value;const fuel=document.getElementById("filtro-combustible").value;let url=API+"/prices?";if(mun)url+="municipality="+mun+"&";if(fuel)url+="fuel_type="+fuel;const res=await fetch(url);const prices=await res.json();const list=document.getElementById("prices-list");document.getElementById("total-count").textContent="("+prices.length+")";if(prices.length===0){list.innerHTML="<p style='text-align:center'>No hay precios reportados todavia.</p>";return;}list.innerHTML=prices.map(p=>{const diff=Math.floor((new Date()-new Date(p.reported_at))/60000);const tiempo=diff<60?diff+" min":diff<1440?Math.floor(diff/60)+" hrs":Math.floor(diff/1440)+" dias";return'<div class="price-card"><div class="price-info"><div class="station-name">'+p.station_name+'</div><div class="municipality">'+p.municipality+'</div><span class="fuel-badge fuel-'+p.fuel_type+'">'+p.fuel_type+'</span><div class="time-ago">Hace '+tiempo+'</div></div><div class="price-amount">$'+p.price.toFixed(2)+'</div><div class="votes"><button onclick="votar('+p.id+',\'up\')">👍 '+p.thumbs_up+'</button><button onclick="votar('+p.id+',\'down\')">👎 '+p.thumbs_down+'</button></div></div>';}).join("");} async function votar(id,tipo){await fetch(API+"/prices/"+id+"/thumbs_"+tipo,{method:"POST"});cargarPrecios();}async function reportarPrecio(){const nombre=document.getElementById("station-name").value;const municipio=document.getElementById("municipality").value;const combustible=document.getElementById("fuel-type").value;const precio=document.getElementById("price").value;const msg=document.getElementById("form-message");if(!nombre||!municipio||!combustible||!precio){msg.textContent="Por favor completa todos los campos.";msg.className="error";return;}const res=await fetch(API+"/prices",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({station_name:nombre,municipality:municipio,fuel_type:combustible,price:parseFloat(precio)})});if(res.ok){msg.textContent="Precio reportado exitosamente. Gracias!";msg.className="success";document.getElementById("station-name").value="";document.getElementById("price").value="";cargarPrecios();}else{msg.textContent="Error al reportar. Intenta de nuevo.";msg.className="error";}}document.addEventListener("DOMContentLoaded",()=>{cargarMunicipios();cargarPrecios();});</script></body></html>
